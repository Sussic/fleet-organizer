name: Package release candidate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the v prefix"
        required: true
        default: "0.12.0"

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore FleetOrganizer.sln --force-evaluate

      - name: Build and test
        run: |
          dotnet build FleetOrganizer.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}
          dotnet test FleetOrganizer.sln -c Release --no-build

      - name: Publish portable Windows build
        run: >-
          dotnet publish src/FleetOrganizer.App/FleetOrganizer.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -o artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64

      - name: Package and checksum
        shell: pwsh
        run: |
          Copy-Item LICENSE "artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64/LICENSE.txt"
          Copy-Item CHANGELOG.md "artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64/CHANGELOG.md"
          Compress-Archive -Path "artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64/*" -DestinationPath "artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64.zip"
          $hash = (Get-FileHash "artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64.zip" -Algorithm SHA256).Hash
          "$hash  FleetOrganizer-${{ steps.version.outputs.version }}-win-x64.zip" | Set-Content "artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64.zip.sha256"

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: FleetOrganizer-${{ steps.version.outputs.version }}-win-x64-release-candidate
          path: |
            artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64.zip
            artifacts/FleetOrganizer-${{ steps.version.outputs.version }}-win-x64.zip.sha256
          if-no-files-found: error
          retention-days: 14
