name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FleetOrganizer.sln --force-evaluate

      - name: Audit dependencies
        run: dotnet list FleetOrganizer.sln package --vulnerable --include-transitive

      - name: Build
        run: dotnet build FleetOrganizer.sln -c Release --no-restore

      - name: Test
        run: dotnet test FleetOrganizer.sln -c Release --no-build --collect:"XPlat Code Coverage"
